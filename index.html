<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The River Bar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>The River Bar</h1>
    <p class="tagline">Cocktail Menu</p>
  </header>

  <div class="tabs" id="tabs" role="tablist" aria-label="Cocktail categories"></div>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-name">
    <div class="modal" id="modal">

      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>

      <div class="modal-img-wrap" id="modal-img-wrap"></div>

      <div class="modal-content">
        <div class="modal-category" id="modal-category"></div>
        <h2 class="modal-name" id="modal-name"></h2>
        <div class="modal-source" id="modal-source"></div>
        <p class="modal-description" id="modal-description"></p>
        <div class="divider"></div>
        <div class="modal-ingredients-title">Ingredients</div>
        <ul class="modal-ingredients" id="modal-ingredients"></ul>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
